function parseRecentForm(text){
const res={};
if(!text||!text.trim())return res;
const lines=text.split(”\n”).map(l=>l.trim());
const isCarNum=s=>/^[1-9]$/.test(s);
const isInfo=s=>/[SA][12]?/.test(s)&&/\u6B73|\u671F/.test(s);
const isName=s=>s.length>=2&&/[\u4E00-\u9FAF\u3041-\u3093\u30A1-\u30F3]/.test(s)&&!/\u6B73|\u671F/.test(s);
const dateRe=/^\d{1,2}/\d{1,2}$/;
const posScore=[0,1,0.4,0.4,0,0,-0.3,-0.3,-0.5,-0.5];
let i=0;
while(i<lines.length){
if(!isCarNum(lines[i])){i++;continue;}
const cn=parseInt(lines[i]);
if(i+2>=lines.length||!isName(lines[i+1])||!isInfo(lines[i+2])){i++;continue;}
i+=3;
const positions=[]; let dnf=0;
while(i<lines.length&&!isCarNum(lines[i])){
const l=lines[i];
if(dateRe.test(l)){
const next=lines[i+1]||””;
const p=parseInt(next);
if(!isNaN(p)&&p>=1&&p<=9)positions.push(p);
else if(/[SB\u843D\u5931]/.test(next))dnf++;
}
i++;
}
if(positions.length===0)continue;
const recent=positions.slice(0,10);
const avgScore=recent.reduce((s,p,idx)=>{
return s+(posScore[p]||0)*Math.pow(0.85,idx);
},0)/Math.max(recent.length,1);
const dnfPenalty=Math.min(dnf*0.08,0.30);
const mult=Math.max(0.75,Math.min(1.30,1+avgScore*0.35-dnfPenalty));
const label=mult>=1.15?”\u25CE\u597D\u8ABF”:mult>=1.05?”\u25CB\u3084\u3084\u597D\u8ABF”:mult<=0.85?”\u2715\u4E0D\u8ABF”:mult<=0.95?”\u25B3\u3084\u3084\u4E0D\u8ABF”:”\uFF0D\u5E73\u5747”;
res[cn]={multiplier:mult,label,recentPositions:recent,dnf};
}
return res;
}
